<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="css/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login TRAVELKEV</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="scss/custom.css" />
  </head>
  <body
    class="d-flex justify-content-center text-center align-items-center vh-100 bg-info"
  >
    <script src="./node_modules/bootstrap/dist/js/bootstrap.min.js"></script>

    <div class="formulario shadow rounded-4">
      <form class="text-white bg-primary" style="width: 400px; height: 500px">
        <i class="bi bi-person text-info" style="font-size: 60px;"></i>
        <h1>Login</h1>

        <!-- input user y password -->
        <div class=" input-group d-flex justify-content-center">

          <!-- user -->
          <div
            class="mb-2 input-group-text  gap-3 p-0 text-white bg-info border-primary"
            style="width: 80%; border-radius: 10px;"
          >
            <i class="bi bi-person-circle" style="margin-left: 10px;"></i>
            <input type="text" placeholder="username" class="shadow form-control rounded-right"  />
          </div>
          <!-- password -->
          <div
            class="mb-2 input-group-text  gap-3 p-0 text-white bg-info border-primary"
            style="width: 80%; border-radius: 10px;"
          >
            <i class="bi bi-lock-fill" style="margin-left: 10px;"></i>
            <input
              type="password"
              placeholder="password"
              class="form-control shadow"
            />
          </div>
        </div>
        <!-- input user y paswoord -->
        <!-- opciones contraseña -->
        <div class="d-flex justify-content-between mb-4" style="width: 80%; margin: 10px auto;">
            <div class="d-flex gap-1" style="font-size: 13px">
              <input type="checkbox" />
              <div>Recordar Contraseña</div>
            </div>

            <div style="font-size: 13px">
              <a
                href="#"
                class="text-info text-decoration-none fst-italic fw-semibol"
                style="font-size: 13px"
                >Olvido su contraseña?</a
              >
            </div>
        </div>
        <!-- opciones contraseña -->
        <!-- boton login -->
        <div class="btn btn-info text-primary fw-semibold shadow mb-3" style="width: 80%;">login</div>
        <!-- boton login -->
        <!-- crear cuenta -->
        <div class="d-flex justify-content-center" style="width: 80;">
            <div class="d-flex justify-content-center gap-2" style="width: 80%; font-size: 13px;">
              <div>
                No tienes una cuenta?
              </div>
              <a href="#"
                  class="text-info text-decoration-none fst-italic fw-semibol"
              >Crea una cuenta</a>
          </div>
        </div>
        <!-- crear cuenta -->
        <div class="d-flex justify-content-center py-3">
          <div class="border-bottom" style="width: 80%; height: 0.9rem;">
            <span class="bg-primary px-3">o</span>
          </div>
        </div>
        <!-- iniciar con google -->
        <div class="shadow-sm d-flex justify-content-center gap-2 btn align-items-center text-white border">
          <img src="icons/google.png" alt="" style="width: 25px; height: 25px;">
          <div class="fw-semibold ">continuar con google</div>
        </div>
      </form>
    </div>
  </body>
</html>
